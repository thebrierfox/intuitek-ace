# railway.toml — ACE Server deployment configuration
# Deploy: railway up from /ace/server/

[build]
builder = "nixpacks"
rootDirectory = "projects/intuitek-ace"

[deploy]
startCommand = "uvicorn ace_server:app --host 0.0.0.0 --port $PORT --workers 2"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[environments.production.variables]
# Set these in Railway dashboard — never commit values
# ACE_DB_PATH            = /data/ace.db
# STRIPE_SECRET_KEY      = sk_live_...
# STRIPE_WEBHOOK_SECRET  = whsec_...
# RESEND_API_KEY         = re_...
# FERNET_KEY             = <generated>
# PORT                   = 8000 (Railway sets automatically)
